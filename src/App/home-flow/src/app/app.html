<div class="min-h-screen bg-slate-100">
  <header class="sticky top-0 z-40 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
      <div>
        <div class="text-xs font-semibold uppercase tracking-[0.3em] text-amber-700">HomeFlow</div>
        <div class="mt-1 text-lg font-semibold tracking-tight text-slate-900">Household command center</div>
      </div>

      <nav class="flex items-center gap-2 rounded-full bg-slate-100 p-1">
        @for (item of navItems; track item.path) {
          <a
            class="rounded-full px-4 py-2 text-sm font-medium text-slate-600 transition hover:text-slate-900"
            [routerLink]="item.path"
            routerLinkActive="bg-white text-slate-900 shadow-sm"
          >
            {{ item.label }}
          </a>
        }
      </nav>
    </div>
  </header>

  <router-outlet />
</div>
